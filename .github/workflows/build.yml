name: Build Premium Pro APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
          cache: true

      - name: Clean and Install Dependencies
        run: |
          flutter clean
          rm -rf android/.gradle
          rm -rf $HOME/.pub-cache
          flutter pub cache repair
          flutter pub get

      - name: Download AAR from Google Drive
        run: |
          mkdir -p android/app/libs
          pip install gdown
          gdown https://drive.google.com/uc?id=1rAnf-rq2UM333SJixSqtUomIRZKj_hWf -O android/app/libs/full_binary-6.0-2.aar
          echo "✅ Archivo descargado:"
          ls -la android/app/libs/

      # 🛠️ PARCHAR SUBMÓDULO: eliminar TODAS las líneas con 'com.arthenica'
      - name: Patch ffmpeg_kit_flutter module - remove arthenica dependencies
        run: |
          SUBMODULE_DIR="$HOME/.pub-cache/hosted/pub.dev/ffmpeg_kit_flutter-6.0.3/android"
          if [ -d "$SUBMODULE_DIR" ]; then
            echo "✅ Submódulo encontrado en: $SUBMODULE_DIR"
            # Mostrar las líneas con 'com.arthenica' antes de eliminar (debug)
            echo "🔍 Líneas encontradas antes del parche:"
            grep -n "com\.arthenica" "$SUBMODULE_DIR/build.gradle" || echo "   (ninguna)"
            # Eliminar todas las líneas que contengan 'com.arthenica'
            sed -i '/com\.arthenica/d' "$SUBMODULE_DIR/build.gradle"
            echo "✅ Líneas con 'com.arthenica' eliminadas."
            # Verificar después
            echo "🔍 Líneas después del parche:"
            grep -n "com\.arthenica" "$SUBMODULE_DIR/build.gradle" || echo "   ✅ No quedan líneas."
          else
            echo "⚠️ No se encontró el submódulo. Verifica la versión en pubspec.yaml (6.0.3)."
            exit 1
          fi

      # Parche adicional para namespace (AGP 8.x)
      - name: Patch ffmpeg_kit_flutter for AGP 8.x
        run: |
          FFMPEG_DIR="$HOME/.pub-cache/hosted/pub.dev/ffmpeg_kit_flutter-6.0.3/android"
          if [ -d "$FFMPEG_DIR" ]; then
            sed -i '/android {/a\    namespace "com.arthenica.ffmpegkit"' "$FFMPEG_DIR/build.gradle" || true
            sed -i 's/package="com.arthenica.ffmpegkit.flutter"//g' "$FFMPEG_DIR/src/main/AndroidManifest.xml" || true
            echo "✅ Parche de AGP aplicado"
          fi

      - name: Accept Android Licenses
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/android-sdk-licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $HOME/.android/android-sdk-licenses
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/android-sdk-licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.android/android-sdk-licenses

      - name: Build APKs (split and universal)
        run: |
          flutter build apk --release --split-per-abi --android-skip-build-dependency-validation
          flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: premium-pro-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30