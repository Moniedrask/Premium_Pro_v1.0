name: Build Premium Pro APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # ✅ Aumentar memoria para Gradle
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"
  # ✅ Aumentar memoria para heap de Flutter
  JAVA_OPTS: "-Xmx4g"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: premium-pro-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
          compression-level: 6
