name: Build Premium Pro APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
          cache: true

      - name: Clean and Install Dependencies
        run: |
          flutter clean
          rm -rf android/.gradle
          flutter pub get

      # 🛠️ PARCHAR EL PLUGIN FLUTTER_FFMPEG PARA AÑADIR NAMESPACE
      - name: Patch flutter_ffmpeg for AGP 8.x
        run: |
          FFMPEG_DIR="$HOME/.pub-cache/hosted/pub.dev/flutter_ffmpeg-0.4.2/android"
          if [ -d "$FFMPEG_DIR" ]; then
            echo "✅ Plugin encontrado en: $FFMPEG_DIR"
            # Añadir namespace al build.gradle si no existe
            if ! grep -q 'namespace' "$FFMPEG_DIR/build.gradle"; then
              sed -i '/android {/a\    namespace "com.arthenica.ffmpegkit"' "$FFMPEG_DIR/build.gradle"
              echo "✅ Namespace añadido."
            else
              echo "ℹ️ Namespace ya existe."
            fi
          else
            echo "⚠️ No se encontró el plugin. Verifica la versión (0.4.2)."
            exit 1
          fi

      - name: Accept Android Licenses
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/android-sdk-licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $HOME/.android/android-sdk-licenses
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/android-sdk-licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.android/android-sdk-licenses

      - name: Build APKs (split and universal)
        run: |
          flutter build apk --release --split-per-abi
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: premium-pro-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30