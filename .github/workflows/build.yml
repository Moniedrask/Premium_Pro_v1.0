name: Build Premium Pro APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
          cache: true

      - name: Clean and Install Dependencies
        run: |
          flutter clean
          rm -rf android/.gradle
          rm -rf $HOME/.pub-cache
          flutter pub cache repair
          flutter pub get

      - name: Download AAR from Google Drive
        run: |
          mkdir -p android/app/libs
          pip install gdown
          TEMP_DIR=$(mktemp -d)
          cd $TEMP_DIR
          # Descargar toda la carpeta
          gdown --fuzzy https://drive.google.com/drive/folders/1o-2jJKMguzQ4-JOOCkginqoE7CAcPy4d -O ./ --folder
          
          # Buscar cualquier .aar y renombrarlo
          AAR_FILE=$(find . -name "*.aar" | head -1)
          if [ -n "$AAR_FILE" ]; then
            echo "✅ Usando: $(basename "$AAR_FILE")"
            mv "$AAR_FILE" $GITHUB_WORKSPACE/android/app/libs/full_binary-6.0-2.aar
          else
            echo "❌ No se encontró ningún archivo .aar"
            exit 1
          fi
          
          cd $GITHUB_WORKSPACE
          rm -rf $TEMP_DIR
          echo "✅ Archivo colocado en android/app/libs/full_binary-6.0-2.aar"
          ls -la android/app/libs/

      - name: Patch ffmpeg_kit_flutter for AGP 8.x
        run: |
          FFMPEG_DIR="$HOME/.pub-cache/hosted/pub.dev/ffmpeg_kit_flutter-6.0.3/android"
          if [ -d "$FFMPEG_DIR" ]; then
            sed -i '/android {/a\    namespace "com.arthenica.ffmpegkit"' "$FFMPEG_DIR/build.gradle" || true
            sed -i 's/package="com.arthenica.ffmpegkit.flutter"//g' "$FFMPEG_DIR/src/main/AndroidManifest.xml" || true
            echo "✅ Parche aplicado"
          fi

      - name: Accept Android Licenses
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/android-sdk-licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $HOME/.android/android-sdk-licenses
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/android-sdk-licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.android/android-sdk-licenses

      - name: Build APKs (split and universal)
        run: |
          flutter build apk --release --split-per-abi --android-skip-build-dependency-validation
          flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: premium-pro-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7