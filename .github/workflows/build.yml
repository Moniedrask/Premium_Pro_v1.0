name: Build Premium Pro APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
          cache: true

      - name: Clean and Install Dependencies
        run: |
          flutter clean
          rm -rf android/.gradle
          flutter pub get

      # 📥 Descargar AAR desde Google Drive
      - name: Download ffmpeg-kit-fix.aar from Google Drive
        run: |
          mkdir -p android/app/libs
          pip install gdown
          TEMP_DIR=$(mktemp -d)
          cd $TEMP_DIR
          gdown --fuzzy https://drive.google.com/drive/folders/1o-2jJKMguzQ4-JOOCkginqoE7CAcPy4d -O ./ --folder
          find . -name "*.aar" -exec mv {} $GITHUB_WORKSPACE/android/app/libs/full_binary-6.0-2.aar \;
          cd $GITHUB_WORKSPACE
          rm -rf $TEMP_DIR

      # 🔐 CONFIGURACIÓN DE FIRMA (Keystore desde Secrets)
      - name: Setup Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          echo "✅ Keystore creado en android/app/keystore.jks"
          ls -la android/app/keystore.jks || (echo "❌ No se pudo crear el keystore" && exit 1)
          # Establecer variables de entorno para Gradle (rutas absolutas)
          echo "CM_KEYSTORE_PATH=$GITHUB_WORKSPACE/android/app/keystore.jks" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      # 🔍 Verificar que el alias exista en el keystore
      - name: Verify keystore alias
        env:
          KEYSTORE_PATH: android/app/keystore.jks
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EXPECTED_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ ! -f "$KEYSTORE_PATH" ]; then
            echo "❌ Keystore file not found at $KEYSTORE_PATH"
            exit 1
          fi
          # Listar alias y verificar si el esperado está presente
          ALIAS_LIST=$(keytool -list -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASS" 2>&1 | grep -i "alias name" | awk '{print $NF}' | tr -d '\r')
          if [ -z "$ALIAS_LIST" ]; then
            echo "❌ No se pudieron leer alias del keystore. Verifica la contraseña."
            exit 1
          fi
          echo "Aliases encontrados: $ALIAS_LIST"
          # Verificar si el alias esperado está en la lista (case-insensitive)
          FOUND=false
          for alias in $ALIAS_LIST; do
            if [ "${alias,,}" = "${EXPECTED_ALIAS,,}" ]; then
              FOUND=true
              break
            fi
          done
          if [ "$FOUND" = false ]; then
            echo "❌ El alias '$EXPECTED_ALIAS' no se encontró en el keystore. Aliases disponibles: $ALIAS_LIST"
            exit 1
          else
            echo "✅ Alias '$EXPECTED_ALIAS' verificado correctamente."
          fi

      - name: Accept Android Licenses
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/android-sdk-licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $HOME/.android/android-sdk-licenses
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/android-sdk-licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.android/android-sdk-licenses

      - name: Build APKs (split only)
        run: |
          flutter build apk --release --split-per-abi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: premium-pro-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30