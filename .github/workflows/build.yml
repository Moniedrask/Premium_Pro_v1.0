name: Build Premium Pro APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
          cache: true

      - name: Clean and Install Dependencies
        run: |
          flutter clean
          rm -rf android/.gradle
          flutter pub get

      # 🛠️ PARCHAR DINÁMICO PARA FLUTTER_FFMPEG (cualquier versión)
      - name: Patch flutter_ffmpeg for AGP 8.x
        run: |
          # Buscar el directorio del plugin en la caché (independientemente de la versión)
          FLUTTER_FFMPEG_DIR=$(find $HOME/.pub-cache/hosted/pub.dev -maxdepth 1 -type d -name "flutter_ffmpeg-*" | head -n 1)
          if [ -n "$FLUTTER_FFMPEG_DIR" ]; then
            echo "✅ Plugin encontrado en: $FLUTTER_FFMPEG_DIR"
            cd "$FLUTTER_FFMPEG_DIR/android"
            if [ -f build.gradle ]; then
              if ! grep -q 'namespace' build.gradle; then
                sed -i '/android {/a\    namespace "com.arthenica.ffmpegkit"' build.gradle
                echo "✅ Namespace añadido."
              else
                echo "ℹ️ Namespace ya existe."
              fi
            else
              echo "⚠️ No se encontró build.gradle en la carpeta android."
            fi
          else
            echo "⚠️ No se encontró el plugin flutter_ffmpeg en la caché. Se continuará sin parche."
          fi

      - name: Accept Android Licenses
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/android-sdk-licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $HOME/.android/android-sdk-licenses
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/android-sdk-licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.android/android-sdk-licenses

      - name: Build APKs (split and universal)
        run: |
          flutter build apk --release --split-per-abi
          flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: premium-pro-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30