name: Build Premium Pro APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          channel: 'stable'
          cache: true

      # ==================== MÉTODO 2: CACHÉ OPTIMIZADO ====================
      - name: Clean and Install Dependencies
        run: |
          flutter clean
          rm -rf android/.gradle
          # NO limpiar caché de com.arthenica (MÉTODO 2)
          # rm -rf ~/.gradle/caches/modules-2/files-2.1/com.arthenica
          flutter pub get

      - name: Accept Android Licenses
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/android-sdk-licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $HOME/.android/android-sdk-licenses
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/android-sdk-licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.android/android-sdk-licenses

      # ==================== MÉTODO 2: BUILD CON REINTENTOS ====================
      - name: Build APK (with retry)
        run: |
          cd android
          # Intento 1 con refresh-dependencies
          ./gradlew assembleRelease --refresh-dependencies || \
          # Intento 2 offline
          ./gradlew assembleRelease --offline || \
          # Intento 3 normal
          ./gradlew assembleRelease
          cd ..
          flutter build apk --release --split-per-abi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: premium-pro-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7