plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "com.premiumpro.editor"
    compileSdk = 36
    ndkVersion = "28.0.13004108"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId = "com.premiumpro.editor"
        minSdk = 26
        targetSdk = 36
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled = true
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig = signingConfigs.debug
        }
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

// Repositorio local (debe estar definido)
repositories {
    maven {
        url = file('repo').toURI().toString()
    }
}

// Estrategia de resolución para sustituir la dependencia remota por la local
configurations.all {
    resolutionStrategy.dependencySubstitution {
        // SIN PUNTO: substitute module(...) using module(...)
        substitute module('com.arthenica:ffmpeg-kit-https')
            using module('com.local.ffmpeg-kit:full_binary:6.0-2')
    }
}

dependencies {
    // Dependencia obligatoria para FFmpegKit (stack traces)
    implementation 'com.arthenica:smart-exception-java:0.2.1'

    // Nuestro módulo local (que contiene el AAR)
    implementation 'com.local.ffmpeg-kit:full_binary:6.0-2'

    // --- OTRAS DEPENDENCIAS ---
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.1.20"
    implementation "androidx.multidex:multidex:2.0.1"
}