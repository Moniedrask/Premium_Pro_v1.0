plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "com.premiumpro.editor"
    compileSdk = 36
    ndkVersion = "28.0.13004108"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId = "com.premiumpro.editor"
        minSdk = 26
        targetSdk = 36
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled = true

        // Limitar arquitecturas soportadas (solo las necesarias) [citation:3][citation:7]
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
            // Si quieres solo 64 bits (más moderno), usa: abiFilters 'arm64-v8a'
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig = signingConfigs.debug
        }
        release {
            // No se especifica signingConfig para evitar error de keystore en CI
            // signingConfig = signingConfigs.debug

            // ✅ ACTIVAR COMPRESIÓN Y ELIMINACIÓN DE RECURSOS [citation:2][citation:6]
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Evitar que errores de lint detengan la compilación [citation:3]
    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }

    // Configuración para Android Gradle Plugin 8+ (evita empaquetado legacy) [citation:3]
    packaging {
        dex {
            useLegacyPackaging true
        }
        jniLibs {
            useLegacyPackaging true
        }
    }
}

flutter {
    source = "../.."
}

// Excluir dependencia remota de Arthenica (por si acaso)
configurations.implementation {
    exclude group: "com.arthenica", module: "ffmpeg-kit-https"
}

dependencies {
    implementation 'com.arthenica:smart-exception-java:0.2.1'
    implementation files('libs/full_binary-6.0-2.aar')
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.1.20"
    implementation "androidx.multidex:multidex:2.0.1"
}