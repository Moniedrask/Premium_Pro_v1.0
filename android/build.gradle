allprojects {
    repositories {
        google()
        mavenCentral()
        // Repositorio local donde tienes tu AAR (si existe)
        maven {
            url = project(':app').file('repo').toURI().toString()
        }
        // JitPack ELIMINADO porque no lo necesitas y causa error 521
        // maven { url 'https://jitpack.io' }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}