allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
        // No es necesario el repositorio local Maven si usamos files()
    }
}

// Aplicar la estrategia de resolución a todos los subproyectos
subprojects {
    configurations.all {
        resolutionStrategy {
            eachDependency { DependencyResolveDetails details ->
                if (details.requested.group == 'com.arthenica' && details.requested.name == 'ffmpeg-kit-https') {
                    // Como ahora usamos files(), esta sustitución puede no ser necesaria,
                    // pero la dejamos por si acaso algún otro submódulo (como :ffmpeg_kit_flutter)
                    // intenta resolver la dependencia remota.
                    details.useTarget files("${project(':app').projectDir}/libs/full_binary-6.0-2.aar")
                }
            }
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}