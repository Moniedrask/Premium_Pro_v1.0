allprojects {
    repositories {
        google()
        mavenCentral()
        // Repositorio local dentro del proyecto (donde está tu AAR)
        maven {
            url = project(':app').file('repo').toURI().toString()
        }
        // JitPack NO es necesario; se elimina para evitar errores 521
        // maven { url 'https://jitpack.io' }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}