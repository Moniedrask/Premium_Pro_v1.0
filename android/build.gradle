allprojects {
    repositories {
        // ==================== PRIORIDAD 1: GOOGLE (Flutter artifacts) ====================
        google()
        maven { url 'https://maven.google.com' }
        
        // ==================== PRIORIDAD 2: FLUTTER ====================
        maven { url 'https://storage.googleapis.com/download.flutter.io' }
        
        // ==================== PRIORIDAD 3: MAVEN CENTRAL ====================
        mavenCentral()
        maven { url 'https://repo.maven.apache.org/maven2' }
        
        // ==================== PRIORIDAD 4: ARTHENICA (solo ffmpeg) ====================
        maven { url 'https://arthenica.com/maven' }
        maven { url 'https://arthenica.github.io/ffmpeg-kit/maven' }
        
        // ==================== PRIORIDAD 5: JITPACK (fallback) ====================
        maven { url 'https://jitpack.io' }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}