// ==================== TODOS LOS REPOSITORIOS DISPONIBLES ====================
allprojects {
    repositories {
        // ==================== PRIORIDAD 1: MIRRORS ====================
        maven { url 'https://jitpack.io' }
        maven { url 'https://maven.google.com' }
        
        // ==================== PRIORIDAD 2: PRINCIPALES ====================
        google()
        mavenCentral()
        
        // ==================== PRIORIDAD 3: ARTHENICA (MÚLTIPLES URLs) ====================
        maven { url 'https://arthenica.com/maven' }
        maven { url 'https://arthenica.github.io/ffmpeg-kit/maven' }
        maven { url 'https://github.com/arthenica/ffmpeg-kit/releases/download/v6.0/maven' }
        maven { url 'https://raw.githubusercontent.com/arthenica/ffmpeg-kit/v6.0/maven' }
        maven { url 'https://arthenica.bintray.com/maven' }
        
        // ==================== PRIORIDAD 4: FALLBACKS ====================
        maven { url 'https://repo.maven.apache.org/maven2' }
        maven { url 'https://storage.googleapis.com/download.flutter.io' }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}