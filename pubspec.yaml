name: premium_pro
description: Editor Multimedia Profesional v1.0 - Estable, Sin Publicidad, OLED.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffmpeg_kit_flutter: 6.0.3
  provider: ^6.1.5+1
  file_picker: 8.1.7
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  http: ^1.6.0
  flutter_colorpicker: 1.1.0
  cached_network_image: 3.4.1
  audioplayers: 6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/luts/
    - assets/models/