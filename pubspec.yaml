name: premium_pro
description: Editor Multimedia Profesional v1.0 - Estable, Sin Publicidad, OLED.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ==================== MULTIMEDIA ====================
  ffmpeg_kit_flutter: ^6.0.3

  # ==================== ESTADO ====================
  provider: ^6.0.5

  # ==================== ARCHIVOS Y ALMACENAMIENTO ====================
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  shared_preferences: ^2.2.2

  # ==================== RED ====================
  http: ^1.1.0

  # ==================== UI ====================
  flutter_colorpicker: ^1.0.3
  cached_network_image: ^3.3.0

  # ==================== AUDIO ====================
  audioplayers: ^5.2.1

  # ==================== UTILIDADES ====================
  path: ^1.8.3
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/luts/
    - assets/models/
