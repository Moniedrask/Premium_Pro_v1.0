name: premium_pro
description: Editor Multimedia Profesional v1.0 - Estable, Sin Publicidad, OLED.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Multimedia - Actualizado Marzo 2026
  ffmpeg_kit_flutter: 7.0.0
  
  # Estado y Utilidades
  provider: 6.1.5
  path_provider: 2.1.5
  file_picker: 8.1.7
  shared_preferences: 2.5.3
  http: 1.4.0
  
  # UI y Gráficos
  flutter_colorpicker: 1.1.0
  cached_network_image: 3.4.1
  audioplayers: 6.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/luts/
    - assets/models/
