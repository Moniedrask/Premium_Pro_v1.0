name: premium_pro
description: Editor Multimedia Profesional v1.0 - Estable y Optimizado.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Motor FFmpeg principal (Soporte amplio de códecs)
  ffmpeg_kit_flutter: ^6.0.3
  # Gestión de estado y arquitectura
  provider: ^6.0.5
  # Utilidades para archivos y rutas
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  # Gráficos y UI
  flutter_colorpicker: ^1.0.3
  cached_network_image: ^3.3.0
  # Audio visualization
  audioplayers: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/