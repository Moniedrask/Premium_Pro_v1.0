name: premium_pro
description: Editor Multimedia Profesional v1.0 - Estable, Sin Publicidad, OLED.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffmpeg_kit_flutter_minimal: 6.0.8
  provider: ^6.1.5+1
  file_picker: 8.1.7  # ⚠️ No actualizar, requiere verificar cambios en la API
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  http: ^1.6.0
  flutter_colorpicker: 1.1.0
  cached_network_image: 3.4.1
  audioplayers: ^6.6.0  # ✅ Actualización segura (versión parche)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0  # ✅ Actualización segura

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/luts/
    - assets/models/