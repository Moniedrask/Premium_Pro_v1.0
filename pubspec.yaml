name: premium_pro
description: Editor Multimedia Profesional v1.0 - Estable, Sin Publicidad, OLED.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  ffmpeg_kit_flutter:
  git:
    url: https://github.com/arthenica/ffmpeg-kit.git      # Repositorio
    ref: v6.0                                              # Tag/versión
    path: flutter/ffmpeg_kit_flutter                       # Subdirectorio del paquete

  # ==================== OPCIÓN 2: ALTERNATIVA (COMENTADA - ACTIVAR SI FALLA OPCIÓN 1) ====================
  # Si la opción 1 falla, comenta la línea de arriba y descomenta UNA de estas:
  # ffmpeg_kit_flutter_min: 6.0.2
  # ffmpeg_kit_flutter_audio: 6.0.2
  # flutter_ffmpeg: 0.4.0
  
  provider: 6.1.2
  file_picker: 8.1.7
  path_provider: 2.1.4
  shared_preferences: 2.5.3
  http: 1.4.0
  flutter_colorpicker: 1.1.0
  cached_network_image: 3.4.1
  audioplayers: 6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/luts/
    - assets/models/